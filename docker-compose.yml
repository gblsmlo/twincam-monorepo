x-app-environment: &app-environment
  NODE_ENV: ${NODE_ENV:-development}
  DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://twincam:twincam@postgres:5432/twincam}
  DATABASE_MIGRATION_URL: ${COMPOSE_DATABASE_MIGRATION_URL:-postgresql://twincam:twincam@postgres:5432/twincam}
  DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-5}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-development-secret-change-me-123456}
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
  BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:3001}
  APP_NAME: ${APP_NAME:-Twincam}
  VITE_APP_NAME: ${VITE_APP_NAME:-Twincam}

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    command: bun run dev --host 0.0.0.0
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    volumes:
      - .:/app
      - web_package_node_modules:/app/apps/web/node_modules
      - auth_package_node_modules:/app/packages/auth/node_modules
      - core_package_node_modules:/app/packages/core/node_modules
      - infra_database_package_node_modules:/app/packages/infra/database/node_modules
      - infra_env_package_node_modules:/app/packages/infra/env/node_modules
      - observability_package_node_modules:/app/packages/observability/node_modules
      - ui_package_node_modules:/app/packages/ui/node_modules
      - web_node_modules:/app/node_modules

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    command: bun run dev
    ports:
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    environment: *app-environment
    volumes:
      - .:/app
      - api_package_node_modules:/app/apps/api/node_modules
      - auth_package_node_modules:/app/packages/auth/node_modules
      - core_package_node_modules:/app/packages/core/node_modules
      - infra_database_package_node_modules:/app/packages/infra/database/node_modules
      - infra_env_package_node_modules:/app/packages/infra/env/node_modules
      - observability_package_node_modules:/app/packages/observability/node_modules
      - api_node_modules:/app/node_modules

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: twincam
      POSTGRES_USER: twincam
      POSTGRES_PASSWORD: twincam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  api_node_modules:
  api_package_node_modules:
  auth_package_node_modules:
  postgres_data:
  core_package_node_modules:
  infra_database_package_node_modules:
  infra_env_package_node_modules:
  observability_package_node_modules:
  ui_package_node_modules:
  web_package_node_modules:
  web_node_modules:
